<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Request a custom cake quote or pre-order tropical pastries from Island Cravings in Trinidad.">
    <title>Order & Quote Form | Island Cravings</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Form-specific visual aids for validation and required fields */
        .mandatory { color: #E2725B; font-weight: bold; } /* cite: 403 */
        .error-message { color: #E2725B; font-size: 0.85rem; display: block; margin-top: 4px; min-height: 1.2rem; }
        input.invalid, select.invalid, textarea.invalid { border: 2px solid #E2725B !important; }
    </style>
</head>
<body>

    <header role="banner">
        <div class="container header-flex">
            <div class="logo">
                <a href="index.html"><strong>ISLAND CRAVINGS</strong></a>
            </div>
            <nav role="navigation" aria-label="Main Navigation">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="products.html">Menu</a></li>
                    <li><a href="form.html" style="border-bottom: 2px solid #FFD700;">Order</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="#" class="cart-icon" aria-label="Shopping Cart">🛒</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container" style="padding-top: 50px; max-width: 800px;">
        <section style="text-align: center; margin-bottom: 40px;">
            <h1 style="color: #E2725B;">Order & Quote Requests</h1>
            <p>Fill out the form below to secure your baked goods or request a custom event cake. Fields marked with <span class="mandatory">*</span> are required.</p>
        </section>

        <form id="orderForm" novalidate style="background: #fdfdfd; padding: 40px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 60px;"> <div style="margin-bottom: 20px;">
                <label for="fullName" style="display: block; font-weight: 600; color: #008080;">Full Name <span class="mandatory">*</span></label>
                <input type="text" id="fullName" style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #ccc;">
                <span id="nameError" class="error-message" aria-live="polite"></span> </div>

            <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
                <div style="margin-bottom: 20px;">
                    <label for="emailAddress" style="display: block; font-weight: 600; color: #008080;">Email Address <span class="mandatory">*</span></label>
                    <input type="email" id="emailAddress" style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #ccc;">
                    <span id="emailError" class="error-message" aria-live="polite"></span>
                </div>

                <div style="margin-bottom: 20px;">
                    <label for="phoneNumber" style="display: block; font-weight: 600; color: #008080;">Trinidad & Tobago Phone Number <span class="mandatory">*</span></label>
                    <input type="tel" id="phoneNumber" placeholder="e.g., 868-123-4567" style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #ccc;">
                    <span id="phoneError" class="error-message" aria-live="polite"></span>
                </div>
            </div>

            <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
                <div style="margin-bottom: 20px;">
                    <label for="orderDate" style="display: block; font-weight: 600; color: #008080;">Date Required <span class="mandatory">*</span></label>
                    <input type="date" id="orderDate" style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #ccc;">
                    <span id="dateError" class="error-message" aria-live="polite"></span>
                </div>

                <div style="margin-bottom: 20px;">
                    <label for="orderType" style="display: block; font-weight: 600; color: #008080;">What are you requesting? <span class="mandatory">*</span></label>
                    <select id="orderType" style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #ccc;">
                        <option value="">-- Select an Option --</option>
                        <option value="custom-cake">Custom Decorative Cake Quote</option>
                        <option value="pastry-bulk">Bulk Pastry Box (Guava Tarts, Currant Rolls)</option>
                        <option value="savory-batch">Savory Favorites (Cheese Pies, Chicken Puffs)</option>
                        <option value="bread-batch">Traditional Loaves (Sweet Bread, Coconut Bread)</option>
                    </select>
                    <span id="typeError" class="error-message" aria-live="polite"></span>
                </div>
            </div>

            <div style="margin-bottom: 25px;">
                <label for="orderNotes" style="display: block; font-weight: 600; color: #008080;">Dietary Restrictions or Special Instructions</label>
                <textarea id="orderNotes" rows="5" placeholder="List item quantities, flavor preferences, or allergies here..." style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #ccc; font-family: inherit;"></textarea>
            </div>

            <button type="submit" class="cta-button" style="width: 100%; border: none; cursor: pointer; padding: 15px; font-size: 1.1rem;">Submit Order Request</button>
        </form>
    </main>

    <footer role="contentinfo">
        <div class="container footer-grid">
            <div class="footer-section">
                <h4>Follow Us</h4>
                <p>INSTAGRAM: <a href="https://instagram.com/IslandsCravingstt" style="color: #FFD700; text-decoration: none;">@IslandsCravingstt</a></p>
            </div>
            <div class="footer-section">
                <h4>Hours</h4>
                <p>Mon-Sat: 8am - 6pm</p>
            </div>
            <div class="footer-section">
                <h4>Newsletter</h4>
                <form id="newsletterForm">
                    <input type="email" placeholder="Your Email" aria-label="Email for newsletter" style="padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; width: 100%;">
                    <button type="submit" style="padding: 10px 20px; background: #FFD700; border: none; border-radius: 5px; cursor: pointer; color: #008080; font-weight: 700;">Submit</button>
                </form>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('orderForm').addEventListener('submit', function(event) {
            let isValid = true;

            // Clear previous errors and reset styles
            const errorSpans = document.querySelectorAll('.error-message');
            errorSpans.forEach(span => span.textContent = '');
            const inputs = document.querySelectorAll('input, select');
            inputs.forEach(input => input.classList.remove('invalid'));

            // 1. Validate Full Name (Not empty)
            const fullName = document.getElementById('fullName');
            if (fullName.value.trim() === '') {
                document.getElementById('nameError').textContent = 'Please enter your full name.'; // Custom error message
                fullName.classList.add('invalid');
                isValid = false;
            }

            // 2. Validate Email Address (Pattern matching)
            const email = document.getElementById('emailAddress');
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email.value.trim())) {
                document.getElementById('emailError').textContent = 'Please enter a valid email address (e.g., name@domain.com).';
                email.classList.add('invalid');
                isValid = false;
            }

            // 3. Validate Phone Number (Trinidad 868 pattern check: XXX-XXX-XXXX or XXXXXXX)
            const phone = document.getElementById('phoneNumber');
            const phonePattern = /^(?:\+?1[-.\s]?)?\(?868\)?[-.\s]?\d{3}[-.\s]?\d{4}$|^\d{7}$/; // Checks for 7-digit or standard T&T 868 formatting
            if (!phonePattern.test(phone.value.trim())) {
                document.getElementById('phoneError').textContent = 'Please enter a valid 7-digit or 868 local phone number.';
                phone.classList.add('invalid');
                isValid = false;
            }

            // 4. Validate Date (Cannot be empty)
            const orderDate = document.getElementById('orderDate');
            if (orderDate.value === '') {
                document.getElementById('dateError').textContent = 'Please select a required pickup/delivery date.';
                orderDate.classList.add('invalid');
                isValid = false;
            }

            // 5. Validate Order Type Selection (Cannot be blank drop-down)
            const orderType = document.getElementById('orderType');
            if (orderType.value === '') {
                document.getElementById('typeError').textContent = 'Please select an order type from the menu.';
                orderType.classList.add('invalid');
                isValid = false;
            }

            // Block submission if verification fails
            if (!isValid) {
                event.preventDefault(); // Stop form from submitting
            } else {
                event.preventDefault(); // Simulated submission for the prototype
                alert('Success! Your pre-order request has been securely dispatched to Island Cravings.');
                document.getElementById('orderForm').reset();
            }
        });
    </script>
</body>
</html>
